services:
  redis:
    image: redis:7-alpine
    container_name: redis
    restart: always
    ports:
      - "127.0.0.1:6379:6379"   # localhost only — not exposed publicly
    command: redis-server --save "" --appendonly no  # no persistence — cache only

  app:
    build: .
    container_name: sentiment-app
    restart: always
    ports:
      - "8082:5000"
    env_file: .env
    environment:
      - REDIS_URL=redis://redis:6379  # uses Docker service name
    depends_on:
      - redis
