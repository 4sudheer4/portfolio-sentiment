name: Deploy to EC2

on:
  push:
    branches:
      - main

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v3

      - name: Deploy to EC2
        uses: appleboy/ssh-action@v0.1.10
        with:
          host: ${{ secrets.EC2_HOST }}
          username: ${{ secrets.EC2_USERNAME }}
          key: ${{ secrets.EC2_SSH_KEY }}
          script: |
            cd /home/ubuntu/portfolio-sentiment
            git pull origin main

            # Stop any stale standalone containers that may hold ports
            docker stop redis postgres sentiment-app 2>/dev/null || true
            docker rm   redis postgres sentiment-app 2>/dev/null || true

            docker-compose down || true
            docker-compose build app
            docker-compose up -d
